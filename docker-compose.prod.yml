# DigitalOcean production overrides.
# Usage on the Droplet:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences vs. local:
#   - Drop MinIO; point SPACES_* at DigitalOcean Spaces (set in .env).
#   - Caddy serves real domain with auto-HTTPS (set SITE_ADDRESS + ACME email).
#   - Do not expose the API port publicly (only Caddy is public).

services:
  web:
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set your domain, e.g. factory.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  api:
    environment:
      APP_ENV: production
    ports: []          # not publicly exposed in prod

  worker: {}

  # MinIO is not used in production — DO Spaces replaces it.
  minio:
    profiles: ["disabled"]

volumes:
  caddy_data:
  caddy_config:
