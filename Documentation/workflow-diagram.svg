<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#fbbf24" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">Natal Image Factory — How It Works</text>
  <rect x="250" y="52" width="400" height="3" rx="2" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- ═══════════════ ROW 1: UPLOAD ═══════════════ -->
  <!-- Card: Upload Text -->
  <rect x="60" y="80" width="170" height="100" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="106" fill="#94a3b8" font-size="11" font-weight="600" text-transform="uppercase" letter-spacing="1.5">STEP 1a</text>
  <text x="145" y="138" text-anchor="middle" fill="#e2e8f0" font-size="28">📝</text>
  <text x="145" y="164" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Upload Article</text>

  <!-- Card: Upload Audio -->
  <rect x="280" y="80" width="170" height="100" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="310" y="106" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1b</text>
  <text x="365" y="138" text-anchor="middle" fill="#e2e8f0" font-size="28">🎙️</text>
  <text x="365" y="164" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Upload Voiceover</text>

  <!-- Arrow from uploads down -->
  <line x1="145" y1="180" x2="145" y2="210" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="365" y1="180" x2="365" y2="210" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Merge arrows into analysis -->
  <line x1="145" y1="210" x2="310" y2="240" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="365" y1="210" x2="310" y2="240" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Settings Panel (right side) -->
  <rect x="560" y="80" width="290" height="100" rx="12" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="106" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="1.5">YOUR SETTINGS</text>
  <text x="590" y="128" fill="#cbd5e1" font-size="12">⚙️  Visual style: Classical, Medieval, Modern…</text>
  <text x="590" y="148" fill="#cbd5e1" font-size="12">🏛️  Preferred sources: LOC, Louvre, Met…</text>
  <text x="590" y="168" fill="#cbd5e1" font-size="12">🤖  AI-generated images: On / Off</text>

  <!-- Dotted line from settings to analysis -->
  <line x1="560" y1="155" x2="475" y2="275" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- ═══════════════ ROW 2: ANALYSIS ═══════════════ -->
  <rect x="200" y="240" width="220" height="90" rx="12" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="266" fill="#60a5fa" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2 — AI ANALYSIS</text>
  <text x="310" y="296" text-anchor="middle" fill="#e2e8f0" font-size="28">🧠</text>
  <text x="310" y="320" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Segment &amp; Timestamp</text>

  <!-- Arrow down -->
  <line x1="310" y1="330" x2="310" y2="370" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════ ROW 3: SEARCH ═══════════════ -->
  <rect x="120" y="370" width="380" height="90" rx="12" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="396" fill="#34d399" font-size="11" font-weight="600" letter-spacing="1.5">STEP 3 — IMAGE SEARCH</text>

  <!-- Source icons row -->
  <text x="160" y="434" fill="#cbd5e1" font-size="12">🏛️ Library of Congress</text>
  <text x="310" y="434" fill="#cbd5e1" font-size="12">🖼️ Wikimedia</text>
  <text x="160" y="452" fill="#cbd5e1" font-size="12">🎨 The Met / Louvre</text>
  <text x="310" y="452" fill="#cbd5e1" font-size="12">📷 Unsplash</text>

  <!-- Right-side detail: segment breakdown -->
  <rect x="560" y="260" width="290" height="200" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="286" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SEGMENT PREVIEW</text>
  <!-- Segment bars -->
  <rect x="580" y="300" width="250" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="580" y="300" width="80" height="24" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="590" y="316" fill="#fff" font-size="10" font-weight="600">0:00 – 1:42</text>
  <text x="670" y="316" fill="#94a3b8" font-size="10">Roman Empire origins…</text>

  <rect x="580" y="330" width="250" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="580" y="330" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="590" y="346" fill="#fff" font-size="10" font-weight="600">1:42 – 3:55</text>
  <text x="690" y="346" fill="#94a3b8" font-size="10">Military expansion…</text>

  <rect x="580" y="360" width="250" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="580" y="360" width="70" height="24" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="590" y="376" fill="#fff" font-size="10" font-weight="600">3:55 – 5:10</text>
  <text x="660" y="376" fill="#94a3b8" font-size="10">Art &amp; architecture…</text>

  <rect x="580" y="390" width="250" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="580" y="390" width="120" height="24" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="590" y="406" fill="#fff" font-size="10" font-weight="600">5:10 – 7:38</text>
  <text x="710" y="406" fill="#94a3b8" font-size="10">Decline &amp; fall…</text>

  <!-- Image thumbnails hint -->
  <text x="590" y="438" fill="#64748b" font-size="11">Each segment → one curated image</text>
  <text x="590" y="454" fill="#64748b" font-size="11">Img_1_roman_map.jpg  ↔  0:00–1:42</text>

  <!-- Arrow down from search -->
  <line x1="310" y1="460" x2="310" y2="500" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ═══════════════ ROW 4: OUTPUT ═══════════════ -->
  <rect x="140" y="500" width="340" height="90" rx="12" fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="526" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4 — OUTPUT PACKAGE</text>
  <text x="175" y="555" fill="#e2e8f0" font-size="26">📦</text>
  <text x="210" y="554" fill="#f1f5f9" font-size="13" font-weight="600">Download .ZIP</text>
  <text x="210" y="574" fill="#94a3b8" font-size="11">Img_1_…, Img_2_…, timestamps.txt</text>

  <!-- Arrow to final output icon -->
  <line x1="480" y1="545" x2="540" y2="545" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Final download icon -->
  <rect x="550" y="510" width="80" height="70" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="555" text-anchor="middle" fill="#fbbf24" font-size="32">⬇️</text>

  <!-- Footer -->
  <text x="450" y="610" text-anchor="middle" fill="#475569" font-size="11">Natal Image Factory · Design Overview · v1.0</text>
</svg>
