<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="960" height="720" rx="16" fill="url(#bg)"/>
  <text x="480" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Natal Image Factory — Technical Architecture</text>
  <rect x="300" y="50" width="360" height="3" rx="2" fill="#3b82f6" opacity="0.7"/>

  <!-- ===== CLIENT ===== -->
  <rect x="40" y="75" width="200" height="90" rx="12" fill="url(#card)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="60" y="100" fill="#60a5fa" font-size="10" font-weight="700" letter-spacing="1.5">BROWSER (SPA)</text>
  <text x="60" y="122" fill="#e2e8f0" font-size="12">React + Vite + Tailwind</text>
  <text x="60" y="140" fill="#94a3b8" font-size="11">Upload · Settings · Review</text>
  <text x="60" y="156" fill="#94a3b8" font-size="11">shadcn/ui components</text>

  <!-- arrow to caddy -->
  <line x1="240" y1="120" x2="300" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#ar)"/>
  <text x="248" y="113" fill="#64748b" font-size="9">HTTPS</text>

  <!-- ===== DROPLET BOUNDARY ===== -->
  <rect x="300" y="70" width="430" height="470" rx="14" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="318" y="92" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="1">DIGITALOCEAN DROPLET · Docker Compose</text>

  <!-- Caddy -->
  <rect x="320" y="105" width="170" height="60" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="338" y="128" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="1">CADDY</text>
  <text x="338" y="148" fill="#cbd5e1" font-size="11">Reverse proxy · Auto-TLS</text>

  <!-- API -->
  <rect x="320" y="185" width="170" height="80" rx="10" fill="url(#card)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="338" y="208" fill="#60a5fa" font-size="10" font-weight="700" letter-spacing="1">API · FastAPI</text>
  <text x="338" y="228" fill="#cbd5e1" font-size="11">REST + WebSocket</text>
  <text x="338" y="246" fill="#94a3b8" font-size="10">jobs, projects, review</text>

  <!-- Worker -->
  <rect x="540" y="185" width="170" height="80" rx="10" fill="url(#card)" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="558" y="208" fill="#34d399" font-size="10" font-weight="700" letter-spacing="1">WORKER · Celery</text>
  <text x="558" y="228" fill="#cbd5e1" font-size="11">Pipeline stages</text>
  <text x="558" y="246" fill="#94a3b8" font-size="10">ffmpeg · Pillow</text>

  <!-- Redis -->
  <rect x="540" y="105" width="170" height="60" rx="10" fill="url(#card)" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
  <text x="558" y="128" fill="#f87171" font-size="10" font-weight="700" letter-spacing="1">REDIS</text>
  <text x="558" y="148" fill="#cbd5e1" font-size="11">Job queue · progress</text>

  <!-- SQLite -->
  <rect x="320" y="285" width="170" height="60" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="338" y="308" fill="#fbbf24" font-size="10" font-weight="700" letter-spacing="1">SQLITE (SQLAlchemy)</text>
  <text x="338" y="328" fill="#cbd5e1" font-size="11">projects · segments · assets</text>

  <!-- Pipeline stages box -->
  <rect x="320" y="365" width="390" height="155" rx="10" fill="#0d1526" stroke="#334155" stroke-width="1"/>
  <text x="338" y="386" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">PROCESSING PIPELINE (worker stages)</text>

  <rect x="334" y="398" width="110" height="42" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="389" y="416" text-anchor="middle" fill="#e2e8f0" font-size="10">1 · Transcribe</text>
  <text x="389" y="430" text-anchor="middle" fill="#64748b" font-size="9">Whisper</text>

  <rect x="454" y="398" width="110" height="42" rx="7" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="509" y="416" text-anchor="middle" fill="#e2e8f0" font-size="10">2 · Segment</text>
  <text x="509" y="430" text-anchor="middle" fill="#64748b" font-size="9">GPT-4o</text>

  <rect x="574" y="398" width="120" height="42" rx="7" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="634" y="416" text-anchor="middle" fill="#e2e8f0" font-size="10">3 · Media Search</text>
  <text x="634" y="430" text-anchor="middle" fill="#64748b" font-size="9">stills + video</text>

  <rect x="334" y="452" width="110" height="42" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="389" y="470" text-anchor="middle" fill="#e2e8f0" font-size="10">4 · Rank/Match</text>
  <text x="389" y="484" text-anchor="middle" fill="#64748b" font-size="9">vision scoring</text>

  <rect x="454" y="452" width="110" height="42" rx="7" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="509" y="470" text-anchor="middle" fill="#e2e8f0" font-size="10">5 · Trim/Norm</text>
  <text x="509" y="484" text-anchor="middle" fill="#64748b" font-size="9">ffmpeg</text>

  <rect x="574" y="452" width="120" height="42" rx="7" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="634" y="470" text-anchor="middle" fill="#e2e8f0" font-size="10">6 · Package ZIP</text>
  <text x="634" y="484" text-anchor="middle" fill="#64748b" font-size="9">manifest.txt</text>

  <!-- internal arrows -->
  <line x1="405" y1="165" x2="405" y2="185" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="490" y1="225" x2="540" y2="225" stroke="#34d399" stroke-width="1.5" marker-end="url(#arG)"/>
  <line x1="625" y1="165" x2="625" y2="185" stroke="#f87171" stroke-width="1.5"/>
  <line x1="405" y1="265" x2="405" y2="285" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== SPACES ===== -->
  <rect x="770" y="105" width="160" height="100" rx="12" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh)"/>
  <text x="788" y="130" fill="#22d3ee" font-size="10" font-weight="700" letter-spacing="1">DO SPACES (S3)</text>
  <text x="788" y="152" fill="#cbd5e1" font-size="11">uploads/</text>
  <text x="788" y="170" fill="#cbd5e1" font-size="11">media-cache/</text>
  <text x="788" y="188" fill="#cbd5e1" font-size="11">output/*.zip + CDN</text>

  <line x1="710" y1="225" x2="770" y2="170" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== EXTERNAL AI ===== -->
  <rect x="770" y="240" width="160" height="120" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5" filter="url(#sh)"/>
  <text x="788" y="265" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="1">EXTERNAL AI APIs</text>
  <text x="788" y="287" fill="#cbd5e1" font-size="11">OpenAI Whisper</text>
  <text x="788" y="305" fill="#cbd5e1" font-size="11">GPT-4o (segment)</text>
  <text x="788" y="323" fill="#cbd5e1" font-size="11">GPT-4o Vision (rank)</text>
  <text x="788" y="341" fill="#cbd5e1" font-size="11">DALL·E (optional)</text>

  <line x1="710" y1="240" x2="770" y2="290" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== MEDIA SOURCES ===== -->
  <rect x="40" y="560" width="880" height="135" rx="14" fill="#0d1526" stroke="#475569" stroke-width="1.5"/>
  <text x="58" y="584" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="1.5">PUBLIC-DOMAIN SOURCE ADAPTERS (pluggable)</text>

  <!-- Stills group -->
  <text x="58" y="608" fill="#60a5fa" font-size="10" font-weight="700">STILLS</text>
  <rect x="58" y="616" width="125" height="30" rx="6" fill="#1e293b" stroke="#334155"/><text x="120" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">Library of Congress</text>
  <rect x="191" y="616" width="115" height="30" rx="6" fill="#1e293b" stroke="#334155"/><text x="248" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">Wikimedia</text>
  <rect x="314" y="616" width="90" height="30" rx="6" fill="#1e293b" stroke="#334155"/><text x="359" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">The Met</text>
  <rect x="412" y="616" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155"/><text x="462" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">Smithsonian</text>
  <rect x="520" y="616" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155"/><text x="570" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">Europeana</text>

  <!-- Video group -->
  <text x="640" y="608" fill="#34d399" font-size="10" font-weight="700">VIDEO B-ROLL</text>
  <rect x="640" y="616" width="120" height="30" rx="6" fill="#1e293b" stroke="#10b981"/><text x="700" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">Internet Archive</text>
  <rect x="768" y="616" width="70" height="30" rx="6" fill="#1e293b" stroke="#10b981"/><text x="803" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">NARA</text>
  <rect x="846" y="616" width="66" height="30" rx="6" fill="#1e293b" stroke="#10b981"/><text x="879" y="635" text-anchor="middle" fill="#cbd5e1" font-size="10">NASA</text>

  <!-- second row video -->
  <rect x="640" y="652" width="90" height="28" rx="6" fill="#1e293b" stroke="#10b981"/><text x="685" y="670" text-anchor="middle" fill="#cbd5e1" font-size="10">LoC Films</text>
  <rect x="738" y="652" width="80" height="28" rx="6" fill="#1e293b" stroke="#10b981"/><text x="778" y="670" text-anchor="middle" fill="#cbd5e1" font-size="10">Pexels</text>
  <rect x="826" y="652" width="86" height="28" rx="6" fill="#1e293b" stroke="#10b981"/><text x="869" y="670" text-anchor="middle" fill="#cbd5e1" font-size="10">Pixabay</text>

  <!-- arrow worker->sources -->
  <line x1="595" y1="520" x2="480" y2="560" stroke="#34d399" stroke-width="1.5" marker-end="url(#arG)"/>

  <text x="480" y="710" text-anchor="middle" fill="#475569" font-size="11">Natal Image Factory · Technical Architecture · v1.0</text>
</svg>
